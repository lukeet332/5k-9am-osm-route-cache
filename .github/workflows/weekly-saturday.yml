name: Course cache refresh

# Builds the OSM-derived 5k course cache and pushes EACH route directly to `main` the moment
# it locks — real-time per-route commits, not one batch PR at the end. The cache bot checks
# out with the admin BOT_PAT, so it can push generated DATA straight to the protected branch
# (enforce_admins=false); CODE still goes via PR + CI + AI review (and CI ignores data pushes).
#
# Runs FREQUENTLY during the initial build to fill the cache fast while staying kind to OSM:
# hard rate-limit, 429 backoff, and a circuit-breaker that stops a run early if OSM throttles us.
#
# SELF-CHAINING (the primary driver): the last step waits ~25 min then re-dispatches this same
# workflow (via the BOT_PAT, so the dispatch actually triggers — GITHUB_TOKEN dispatches don't).
# That gives a reliable ~30-min cadence WITHOUT depending on GitHub's flaky `schedule` cron, which
# silently drops runs at busy minutes (it had never once fired this workflow). If OSM throttled us
# (build_cache leaves a .throttled marker), the chain backs off to 60 min — ban-safety first.
# The `schedule` below is now only a BACKSTOP: if a run ever dies before chaining, cron restarts it.
# >>> Once coverage is high, dial the cadence back: raise CHAIN_DELAY / change cron to weekly. <<<
on:
  schedule:
    - cron: "7,37 * * * *"    # BACKSTOP only (off the contended :00/:30 slots GitHub drops); chain is primary
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cache-refresh         # overlapping runs queue (never pile up / hammer OSM in parallel)
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest     # standard runner = free on public repos
    timeout-minutes: 90        # build (~15m) + chain wait (25m, or 60m backoff on throttle) must fit
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_PAT }}    # admin -> push data straight to protected main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build + push each route as it locks (real-time, ban-safe)
        run: |
          git config user.name  cache-bot
          git config user.email cache-bot@users.noreply.github.com
          python3 build_cache.py --limit 30 --commit-each
      - name: Push any trailing gap bookkeeping
        run: |
          git add -A
          git commit -m "cache: gap bookkeeping" || echo "nothing to commit"
          git push || (git pull --rebase origin main && git push) || echo "nothing to push"
      # NOTE: the repo description is refreshed LIVE by refresh-description.yml, which fires on every
      # coverage.json push (per route locked) — no end-of-run description step needed here anymore.
      - name: Self-chain the next run (~30 min cadence; cron is only a backstop)
        if: always()             # chain even if a step failed, so the loop self-heals without the cron
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}    # a PAT dispatch DOES trigger the next run (GITHUB_TOKEN wouldn't)
        run: |
          # Ban-safety: if OSM throttled us this run, back off to 60 min; otherwise ~25 min wait
          # (+ next build ≈ a ~30 min cadence). Single in-flight run is guaranteed by the
          # concurrency group, so this can never fan out into parallel hammering of OSM.
          if [ -f .throttled ]; then
            DELAY=3600; echo "OSM throttled us ($(cat .throttled)x) — backing off 60 min before the next run."
          else
            DELAY=1500; echo "Healthy run — next cache refresh in 25 min."
          fi
          sleep "$DELAY"
          gh workflow run "${{ github.workflow }}" --ref "${{ github.ref_name }}"
