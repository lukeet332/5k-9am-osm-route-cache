name: Course cache refresh

# Builds the OSM-derived 5k course cache and pushes EACH route directly to `main` the moment
# it locks — real-time per-route commits, not one batch PR at the end. The cache bot checks
# out with the admin BOT_PAT, so it can push generated DATA straight to the protected branch
# (enforce_admins=false); CODE still goes via PR + CI + AI review (and CI ignores data pushes).
#
# Runs FREQUENTLY during the initial build to fill the cache fast while staying kind to OSM:
# hard rate-limit, 429 backoff, and a circuit-breaker that stops a run early if OSM throttles us.
#
# SELF-CHAINING (the primary driver): the last step waits ~25 min then re-dispatches this same
# workflow (via the BOT_PAT, so the dispatch actually triggers — GITHUB_TOKEN dispatches don't).
# That gives a reliable ~30-min cadence WITHOUT depending on GitHub's flaky `schedule` cron, which
# silently drops runs at busy minutes (it had never once fired this workflow). If OSM throttled us
# (build_cache leaves a .throttled marker), the chain backs off to 60 min — ban-safety first.
# The `schedule` below is now only a BACKSTOP: if a run ever dies before chaining, cron restarts it.
# >>> Once coverage is high, dial the cadence back: raise CHAIN_DELAY / change cron to weekly. <<<
on:
  schedule:
    - cron: "7,37 * * * *"    # BACKSTOP only (off the contended :00/:30 slots GitHub drops); chain is primary
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cache-refresh         # overlapping runs queue (never pile up / hammer OSM in parallel)
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest     # standard runner = free on public repos
    timeout-minutes: 90        # build (~15m) + chain wait (25m, or 60m backoff on throttle) must fit
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_PAT }}    # admin -> push data straight to protected main
          fetch-depth: 0                   # fetch tags so build_cache stamps the release version (git describe)
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install timezonefinder (per-event local timezone for the global 09:00 anchor)
        run: python3 -m pip install --quiet timezonefinder
      - name: Restore the OSM trace cache (persist across runs -> far fewer refetches)
        # .tracecache holds raw OSM trace responses. It's gitignored (we never commit raw blobs), so
        # without this each fresh checkout re-fetched everything. Restoring the most recent cache and
        # saving a new one per run accumulates it: re-tried gaps + AI re-runs hit the cache, not OSM.
        uses: actions/cache@v4
        with:
          path: .tracecache
          key: osm-tracecache-${{ github.run_id }}
          restore-keys: |
            osm-tracecache-
      - name: Build + push each route as it locks (real-time, ban-safe)
        run: |
          git config user.name  cache-bot
          git config user.email cache-bot@users.noreply.github.com
          python3 build_cache.py --limit 50 --commit-each
      - name: Per-country coverage report (README table + coverage_by_country.json)
        run: python3 report.py || echo "report skipped"
      - name: Push any trailing gap bookkeeping
        run: |
          git add -A
          git commit -m "cache: gap bookkeeping" || echo "nothing to commit"
          git push || (git pull --rebase origin main && git push) || echo "nothing to push"
      # NOTE: the repo description is refreshed LIVE by refresh-description.yml, which fires on every
      # coverage.json push (per route locked) — no end-of-run description step needed here anymore.
      - name: Self-chain the next run (cadence auto-adjusts; cron is only a backstop)
        if: always()             # chain even if a step failed, so the loop self-heals without the cron
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}    # a PAT dispatch DOES trigger the next run (GITHUB_TOKEN wouldn't)
        run: |
          # Cadence is SELF-ADJUSTING so we go fast through the one-time initial sweep, then ease off:
          #   - throttled by OSM         -> 60 min backoff (ban-safety first)
          #   - first pass NOT yet done   -> 6 min  (churn through the ~884 untried events overnight;
          #                                  the whole first sweep is only ~thousands of calls one-off)
          #   - first pass complete       -> 25 min (conservative; re-tries mostly hit the trace cache)
          # The per-request 1.5s throttle (RATE_S) — the thing OSM actually polices — never changes.
          # A single in-flight run is guaranteed by the concurrency group: never parallel OSM load.
          TRIED=$(python3 -c "import json;print(len(json.load(open('index.json'))))" 2>/dev/null || echo 0)
          TOTAL=$(python3 -c "import json;print(json.load(open('coverage.json'))['total'])" 2>/dev/null || echo 884)
          LOCKED=$(python3 -c "import json;print(json.load(open('coverage.json'))['locked'])" 2>/dev/null || echo 0)
          # Cadence by phase. NOTE: 'tried' plateaus a bit below 100% — the last ~1-4% are events that
          # error / have no resolvable OSM data, so we never literally hit 100%. So once we're >=96%
          # we treat the sweep as DONE-as-it-gets and drop to a slow STEADY-STATE cadence: this stops
          # us pointlessly re-hammering the unreachable failed/gap tail every 25 min (wasteful + steady
          # OSM load), while still re-checking a few times a day for newly-uploaded OSM data.
          if [ -f .throttled ]; then
            DELAY=3600;  echo "OSM throttled us ($(cat .throttled)x) — backing off 60 min."
          elif [ "$TRIED" -lt $(( TOTAL * 95 / 100 )) ]; then
            DELAY=360;   echo "Initial sweep in progress ($TRIED/$TOTAL tried) — next run in 6 min."
          elif [ "$TRIED" -lt $(( TOTAL * 96 / 100 )) ]; then
            DELAY=1500;  echo "Finishing the tail ($TRIED/$TOTAL) — 25 min cadence."
          else
            # 1h (not longer) so the in-job sleep + build still fit timeout-minutes: 90 — a longer
            # sleep would be killed mid-wait and break the self-chain.
            DELAY=3600;  echo "STEADY STATE ($TRIED/$TOTAL, >=96% — effectively all reachable events swept). Easing to a 1h cadence so we stop spinning on the unreachable failed/gap tail every 25 min; still re-checking hourly for new OSM data."
          fi

          # EVENT-DRIVEN AI maintenance: when a FULL sweep over the events the cache actually re-tries
          # has completed since the last maintenance, the algorithm has fresh data to learn from —
          # trigger one improvement run BEFORE the next sweep. A "sweep" is one pass over the candidates
          # at --limit 50/run: in gap-fill mode that's the NOT-YET-cached events (total - locked, which
          # SHRINKS as coverage grows: 764 -> 744 -> ...); in refine mode (>=80% locked, mirroring
          # build_cache's COVERAGE_REFINE) it re-queries all. Counting runs-since-last-maintenance by
          # timestamp (any status) self-resets the moment maintenance starts, so it won't re-fire
          # mid-run. The reviewer + self-test gate any churn; the daily cron is the fallback.
          if [ $(( LOCKED * 100 )) -ge $(( TOTAL * 80 )) ]; then CANDS=$TOTAL; else CANDS=$(( TOTAL - LOCKED )); fi
          SWEEP_RUNS=$(( CANDS / 50 + 1 ))
          LAST_MAINT=$(gh run list -R "${{ github.repository }}" --workflow=ai-maintenance.yml -L 1 --json createdAt --jq '.[0].createdAt // "1970-01-01T00:00:00Z"' 2>/dev/null || echo "1970-01-01T00:00:00Z")
          SINCE=$(gh run list -R "${{ github.repository }}" --workflow="${{ github.workflow }}" -L 60 --json createdAt --jq "[.[]|select(.createdAt > \"$LAST_MAINT\")]|length" 2>/dev/null || echo 0)
          echo "cache runs since last AI maintenance: $SINCE (a full sweep is ~$SWEEP_RUNS runs)"
          if [ "$SINCE" -ge "$SWEEP_RUNS" ]; then
            echo "→ a full sweep has completed since the last AI maintenance; triggering ai-maintenance."
            gh workflow run ai-maintenance.yml -R "${{ github.repository }}" || true
          fi

          sleep "$DELAY"
          gh workflow run "${{ github.workflow }}" --ref "${{ github.ref_name }}"
