name: Weekly course cache refresh

# Public repo => free, unlimited standard-runner minutes (separate from any private-repo quota).
# Runs Saturday afternoon UK time to gradually grow coverage as the OSM trace corpus does.
# The weekly commit also keeps the schedule alive (GitHub pauses crons after 60 days idle).
on:
  schedule:
    - cron: "0 15 * * 6"   # 15:00 UTC every Saturday
  workflow_dispatch:        # allow manual runs too

permissions:
  contents: write

concurrency:
  group: cache-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest   # standard runner = free on public repos
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build cache (Havant -> north, gaps first, polite/rate-limited)
        run: python3 build_cache.py --limit 60
      # Cache data is the output of already-reviewed code, so its PR carries `cache-update`
      # and auto-merges BYPASSING the code CI (the code self-test is irrelevant to data).
      # Opened with BOT_PAT so auto-merge.yml can merge it.
      - name: Open cache-update PR
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.BOT_PAT }}
          branch: cache/weekly-refresh
          delete-branch: true
          add-paths: |
            routes/**
            index.json
          commit-message: "cache: weekly OSM course refresh"
          title: "🗺️ Weekly cache refresh"
          labels: cache-update
          body: |
            Weekly cache refresh — Havant → north, gap-first, OSM-derived.
            Auto-merges bypassing the code CI (this is generated data, not code).
