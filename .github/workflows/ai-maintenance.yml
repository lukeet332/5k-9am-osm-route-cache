name: AI maintenance (weekly improvement)

# Once a week, a deep-thinking GitHub Models model reviews the cache outcomes + the
# algorithm and proposes ONE improvement (within AI_CONTEXT.md). The change MUST pass the
# offline self-test in this job before a PR opens (bad edits never reach a PR). The PR is
# opened with BOT_PAT (so it triggers CI + the AI reviewer) and labelled needs-ai-review —
# it cannot merge until a SECOND AI approves it and CI is green.
on:
  schedule:
    - cron: "0 6 * * *"      # DAILY 06:00 UTC backstop (build-out phase). The PRIMARY driver is
                             # event-driven: the cache workflow triggers this after each full sweep,
                             # so the algorithm improves against fresh data ~as often as feasible.
                             # >>> Dial back to weekly ("0 6 * * 0") once coverage matures. <<<
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  models: read               # GitHub Models inference via GITHUB_TOKEN

concurrency:
  group: ai-maintenance
  cancel-in-progress: false

jobs:
  improve:
    runs-on: ubuntu-latest
    timeout-minutes: 30        # room for a slow flash generation (~80-150s) + the self-test retry loop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      # Propose a change, then run the self-test gate. If it FAILS, don't silently drop the change —
      # feed the failure back to the author as REVIEW_FEEDBACK and let it self-correct (up to 2 tries),
      # exactly like the reviewer's revision loop. Only a self-test-PASSING change reaches the PR; if
      # it still can't pass after the retries, the job fails and NO PR opens (the gate still holds).
      - name: Propose an improvement (self-test gated, retry-on-failure feedback)
        id: improve
        env:
          GH_MODELS_TOKEN: ${{ secrets.BOT_PAT }}    # GitHub Models needs a real PAT (the built-in GITHUB_TOKEN is not entitled)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}    # other providers optional; skipped if unset
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: |
          for attempt in 1 2; do
            python .github/scripts/ai_improve.py || { echo "author step errored"; exit 1; }
            if OUT=$(python selftest.py 2>&1); then
              echo "$OUT"; echo "self-test passed on attempt $attempt"; exit 0
            fi
            echo "::warning::self-test FAILED on attempt $attempt:"; echo "$OUT"
            export REVIEW_FEEDBACK="Your previous attempt FAILED the offline self-test gate — fix the ROOT CAUSE and keep the tested function names/signatures intact (see the Tested-contract section of AI_CONTEXT.md). Self-test output:
          $OUT"
          done
          echo "::error::author could not pass the self-test after retries — no PR opened."; exit 1

      # GUARANTEED MEMORY: record this change in JOURNAL.md so future runs know what's been tried and
      # don't re-propose it (the churn we saw — doubling re-proposed because the journal was empty). If
      # the author already wrote a (richer) entry, keep it; otherwise append a terse one from the
      # summary. Only when there's a real code change — never create a JOURNAL-only PR.
      - name: Record a JOURNAL entry (accumulated memory)
        if: steps.improve.outcome == 'success'
        run: |
          if git status --porcelain JOURNAL.md | grep -q .; then
            echo "author already journaled — keeping its entry."
          elif git status --porcelain build_cache.py AI_CONTEXT.md | grep -q .; then
            printf '\n### %s — %s (%s, %s)\n- %s\n' "$(date -u +%Y-%m-%d)" \
              "${{ steps.improve.outputs.bot_label || 'ai-bot' }}" \
              "${{ steps.improve.outputs.model_used }}" "${{ steps.improve.outputs.version_bump || 'patch' }}" \
              "${{ steps.improve.outputs.summary }}" >> JOURNAL.md
            echo "appended a JOURNAL entry from the summary."
          else
            echo "no code change — nothing to journal."
          fi

      - name: Open improvement PR (needs AI review)
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.BOT_PAT }}
          branch: ai-improve/${{ steps.improve.outputs.bot_label || 'bot' }}/weekly
          delete-branch: true
          add-paths: |
            build_cache.py
            AI_CONTEXT.md
            JOURNAL.md
          commit-message: "chore: AI cache-algorithm improvement (${{ steps.improve.outputs.bot_label || 'ai-bot' }})"
          title: "🤖 ${{ steps.improve.outputs.bot_label || 'ai-bot' }}: cache algorithm improvement"
          labels: needs-ai-review
          body: |
            Weekly improvement proposed by **`${{ steps.improve.outputs.model_used }}`**.

            > ${{ steps.improve.outputs.summary }}

            Release-Bump: ${{ steps.improve.outputs.version_bump || 'patch' }}

            - Already passed `selftest.py` in this job; CI re-runs it as the merge gate.
            - Must be **approved by a second AI** (`ai-review`) before it can merge.
            - Bound by `AI_CONTEXT.md` — accuracy bars fixed, no AI-authored geometry, kind to OSM.
            Review the diff yourself too — the model can be wrong.
