name: Auto-merge

# Merges a PR the moment all required checks pass — but ONLY once it carries the
# 'automerge' label, which the AI reviewer adds only after it approves. So a code PR
# needs: AI-review approval (label) AND the required CI self-test green. Uses BOT_PAT
# (a real user) so the merge commit triggers downstream workflows.
on:
  pull_request:
    types: [labeled, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: contains(github.event.pull_request.labels.*.name, 'automerge') && !contains(github.event.pull_request.labels.*.name, 'needs-human-approval')
    runs-on: ubuntu-latest
    steps:
      # Wait for the required CI (selftest) to go green on THIS head, then squash-merge with the owner PAT.
      # We do NOT use `gh pr merge --auto`: that only ARMS native auto-merge and waits for the branch to
      # become mergeable — but the repo RULESET keeps approved PRs at mergeable_state=blocked, so it never
      # fires (every PR sat approved-but-unmerged). The owner PAT can merge despite the ruleset gate; we
      # STILL require selftest green first, so admin-merge bypasses only the ruleset, never the test.
      - name: Merge once CI is green (owner merge — native --auto never fires under the ruleset)
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
          PR: ${{ github.event.pull_request.number }}
          SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          C=pending
          for i in $(seq 1 40); do        # ~10 min ceiling for CI to finish on this head
            C=$(gh api "repos/$REPO/commits/$SHA/check-runs" --jq '[.check_runs[]|select(.name=="selftest")]|last|.conclusion // "pending"' 2>/dev/null || echo pending)
            echo "selftest=$C (poll $i)"
            [ "$C" = "success" ] && break
            case "$C" in failure|cancelled|timed_out|action_required|stale)
              echo "selftest not green ($C) — NOT merging (the revise loop owns failures)."; exit 0;; esac
            sleep 15
          done
          [ "$C" = "success" ] || { echo "selftest did not finish in time — leaving for the next trigger."; exit 0; }
          gh api -X PUT "repos/$REPO/pulls/$PR/merge" -f merge_method=squash \
            && echo "merged #$PR" \
            || echo "::warning::merge PUT failed for #$PR — will retry on the next synchronize/label trigger."
