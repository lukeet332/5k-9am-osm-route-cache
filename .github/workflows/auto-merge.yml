name: Auto-merge

# Merges a PR the moment all required checks pass — but ONLY once it carries the
# 'automerge' label, which the AI reviewer adds only after it approves. So a code PR
# needs: AI-review approval (label) AND the required CI self-test green. Uses BOT_PAT
# (a real user) so the merge commit triggers downstream workflows.
on:
  pull_request:
    types: [labeled, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: >
      contains(github.event.pull_request.labels.*.name, 'automerge') ||
      contains(github.event.pull_request.labels.*.name, 'cache-update')
    runs-on: ubuntu-latest
    steps:
      # Code PRs: native auto-merge WAITS for the required checks (CI self-test + AI review).
      - name: Code PR -> auto-merge once checks pass
        if: contains(github.event.pull_request.labels.*.name, 'automerge')
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: gh pr merge --auto --squash "${{ github.event.pull_request.html_url }}"

      # Cache-data PRs: admin-merge, BYPASSING the code CI (generated data, not code).
      # Requires branch protection with enforce_admins=false so the bot can override checks.
      - name: Cache-update PR -> admin-merge (bypass CI)
        if: contains(github.event.pull_request.labels.*.name, 'cache-update')
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: gh pr merge --admin --squash "${{ github.event.pull_request.html_url }}"
