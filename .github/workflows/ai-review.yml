name: AI review (AI-reviews-AI gate)

# Our MERGE-ARBITER AI decides the PR's fate, consuming CodeRabbit's verdict. CodeRabbit (separate) is
# the SOURCE OF TRUTH on code quality + churn: its CHANGES_REQUESTED review BLOCKS merge. Our arbiter
# does NOT re-critique code - it honours CodeRabbit + judges invariants/novelty, then:
#   approve  -> (only when CodeRabbit is NOT blocking) swap needs-ai-review for the automerge label
#               (auto-merge.yml then merges once CI is green).
#   reject   -> post feedback, and have the author REVISE on the branch (re-runs this review). The retry
#               budget SCALES with review-comment volume (~2 per comment thread, hard-capped) instead of a
#               flat shared total, and stops early if the author stalls (two identical revisions). Then
#               hands to a human.
on:
  pull_request:
    # NOT 'opened': the bot opens its PR WITH the needs-ai-review label, so 'opened' AND 'labeled' both
    # fired -> two duplicate review runs (double model spend). 'labeled' alone covers PR creation (the
    # label gates the job anyway); 'synchronize' covers revises; 'reopened' covers reopen.
    types: [labeled, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  models: read

concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  review:
    if: contains(github.event.pull_request.labels.*.name, 'needs-ai-review')
    runs-on: ubuntu-latest
    timeout-minutes: 35        # the reject->revise step runs the author chain, which may try several tiers
    env:
      PR: ${{ github.event.pull_request.number }}
      BRANCH: ${{ github.event.pull_request.head.ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.BOT_PAT }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: Build the PR diff
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: |
          git fetch origin main --quiet
          git diff origin/main...HEAD > pr.diff || true

      - name: Revision-budget guard (progress-aware; scales with review-comment volume)
        id: guard
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: |
          # ROUNDS = author revision commits in THIS PR only (origin/main..HEAD), so [ai-revise] commits
          # from earlier merged PRs already in main don't inflate the count. Match the new [ai-revise h=...]
          # stamp as well as a bare [ai-revise].
          SUBJECTS=$(git log --pretty=format:'%s' origin/main..HEAD)
          ROUNDS=$(printf '%s\n' "$SUBJECTS" | grep -Ec '\[ai-revise([[:space:]]|\])' || true)
          # Budget SCALES with review-comment volume so a multi-comment PR gets multiple retries per
          # comment thread - not one flat shared total that starves it (e.g. 5 rounds across 8 comments).
          # CMTS = inline review comments on the PR (CodeRabbit findings + any line comments). Capped hard
          # at CEILING to protect the free-tier token budget (BIBLE #9).
          CMTS=$(gh api "repos/${{ github.repository }}/pulls/$PR/comments" --jq 'length' 2>/dev/null || echo 0)
          CEILING=12; MAX=$(( 5 + 2 * CMTS )); [ "$MAX" -gt "$CEILING" ] && MAX=$CEILING
          # STALL: if the last two revisions produced an IDENTICAL diff, the author is stuck repeating
          # itself - stop now rather than burn the rest of the budget. Each revise commit stamps its
          # diff hash as [ai-revise h=...]; two equal in a row = no progress.
          HLIST=$(printf '%s\n' "$SUBJECTS" | grep -oE '\[ai-revise[[:space:]]+h=[0-9a-f]+\]' | grep -oE 'h=[0-9a-f]+' | head -2)
          H1=$(printf '%s\n' "$HLIST" | sed -n '1p'); H2=$(printf '%s\n' "$HLIST" | sed -n '2p')
          STALLED=false; [ -n "$H1" ] && [ "$H1" = "$H2" ] && STALLED=true
          PROCEED=true; { [ "$ROUNDS" -ge "$MAX" ] || [ "$STALLED" = "true" ]; } && PROCEED=false
          echo "guard: rounds=$ROUNDS max=$MAX (cmts=$CMTS) stalled=$STALLED -> proceed=$PROCEED"
          { echo "proceed=$PROCEED"; echo "rounds=$ROUNDS"; echo "max=$MAX"; echo "stalled=$STALLED"; } >> "$GITHUB_OUTPUT"

      # ---- CodeRabbit is the SOURCE OF TRUTH on code quality + churn. WAIT for its review of THIS head
      #      (it is async + slower than our re-trigger), then read its verdict. CHANGES_REQUESTED = it is
      #      blocking. Graceful: if it never posts in time / is absent, we do NOT hard-block on it (our
      #      arbiter + selftest still gate). Its summary -> coderabbit_review.txt for the arbiter to read. ----
      - name: Wait for CodeRabbit + read its verdict
        id: crgate
        if: steps.guard.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
          GH_REPO: ${{ github.repository }}   # via env, not inline ${{ }} in run, to avoid template-injection (zizmor)
        run: |
          SHA="${{ github.event.pull_request.head.sha }}"
          BOT="coderabbitai[bot]"   # exact identity - substring match would trust an impostor login on a public repo
          Q="[.[] | select(.user.login==\"$BOT\") | select(.commit_id==\"$SHA\")] | last"
          STATE=""
          for i in $(seq 1 15); do        # ~5 min ceiling; breaks as soon as CodeRabbit reviews this SHA
            STATE=$(gh api "repos/$GH_REPO/pulls/$PR/reviews" --jq "$Q | .state // empty" 2>/dev/null || echo "")
            [ -n "$STATE" ] && break
            sleep 20
          done
          # Feed the arbiter CodeRabbit's WALKTHROUGH (PR explanation: summary + change table + related PRs),
          # not the thin review .body (that points at the author's inline line-fixes; STATE is the gate).
          # ONLY when a review exists for THIS SHA - else the walkthrough comment may describe an older head.
          # Strip mermaid/badges/util-links -> dense digest. Fall back to the SHA-bound review .body.
          CR_SOURCE=none; : > coderabbit_review.txt
          if [ -n "$STATE" ]; then
            # select the WALKTHROUGH/summary comment by its marker - NOT a status reply (CodeRabbit also
            # posts "auto-generated reply" comments); else CR_SOURCE would mislabel a reply as a walkthrough.
            gh api "repos/$GH_REPO/issues/$PR/comments" \
              --jq "[.[] | select(.user.login==\"$BOT\") | select(.body|test(\"summarize by coderabbit\"))] | last | .body // \"\"" 2>/dev/null \
              | sed '/```mermaid/,/```/d' \
              | sed -E 's/<!--[^>]*-->//g; s/!\[[^]]*\]\([^)]*\)//g; s#</?details[^>]*>##g; s#</?summary>##g' \
              | grep -vE '^[[:space:]]*$|storage\.googleapis|utm_source|coderabbit_public_assets' \
              | head -c 4000 > coderabbit_review.txt || true
            if [ -s coderabbit_review.txt ]; then CR_SOURCE=walkthrough
            else
              gh api "repos/$GH_REPO/pulls/$PR/reviews" --jq "$Q | .body // \"\"" > coderabbit_review.txt 2>/dev/null || true
              [ -s coderabbit_review.txt ] && CR_SOURCE=review_body
            fi
          fi
          CR_BLOCKING=false; [ "$STATE" = "CHANGES_REQUESTED" ] && CR_BLOCKING=true
          echo "CodeRabbit for $SHA: state='${STATE:-<none>}' source=$CR_SOURCE blocking=$CR_BLOCKING"
          { echo "cr_state=${STATE:-none}"; echo "cr_blocking=$CR_BLOCKING"; echo "cr_source=$CR_SOURCE"; } >> "$GITHUB_OUTPUT"

      - name: Merge-arbiter AI review
        id: rev
        if: steps.guard.outputs.proceed == 'true'
        env:
          GH_MODELS_TOKEN: ${{ secrets.BOT_PAT }}    # GitHub Models needs a real PAT (the built-in GITHUB_TOKEN is not entitled)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}    # independent reviewer / other providers; skipped if unset
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          CODERABBIT_STATE: ${{ steps.crgate.outputs.cr_state }}    # arbiter honours CodeRabbit's verdict
          CODERABBIT_SOURCE: ${{ steps.crgate.outputs.cr_source }}  # walkthrough | review_body | none - so the label matches the content
          PR_BODY: ${{ github.event.pull_request.body }}    # the author's own rationale (intent/why) - context for the novelty/merge call
        run: python .github/scripts/ai_review.py

      # ---- flag a DEGRADED review (intended reviewer 413'd on a big diff / was rate-limited, so it
      #      fell back to the author model = reduced independence). Don't block — just surface it. ----
      - name: Flag degraded reviewer
        if: steps.guard.outputs.proceed == 'true' && steps.rev.outputs.degraded == 'true'
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: |
          gh pr comment "$PR" --body "$(printf '⚠️ **Degraded review — heads up @lukeet332**\n\nThe preferred reviewer (tier-1 of the reviewer chain) was unavailable for this PR (rate-limited or context-limited), so the review fell back to **`%s`** — a lower tier, so it was **less independent than usual**. Not blocking; flagging so you can sanity-check it, and if this recurs we can swap the reviewer tier-1.' "${{ steps.rev.outputs.reviewer }}")"

      # ---- constitution amendment: ALWAYS human-gated, WITH the reviewer's recommendation ----
      - name: Constitution change -> human gate (with AI recommendation)
        if: steps.guard.outputs.proceed == 'true' && steps.rev.outputs.bible_touched == 'true'
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
          REC: ${{ steps.rev.outputs.recommend }}
          ADVICE: ${{ steps.rev.outputs.advice }}
          REVIEWER: ${{ steps.rev.outputs.reviewer }}
        run: |
          # It must NEVER auto-merge: block it and tag the owner with the reviewer's recommendation.
          gh pr edit "$PR" --add-label needs-human-approval --remove-label needs-ai-review --remove-label automerge || true
          DIFF=$(git diff origin/main...HEAD -- AI_CONTEXT_READ_ONLY_BIBLE.md | head -150)
          if [ "$REC" = "approve" ]; then VERDICT="✅ **APPROVE** — the reviewer thinks this amendment is sound"; else VERDICT="⛔ **DO NOT APPROVE** — the reviewer recommends against this amendment"; fi
          gh pr comment "$PR" --body "$(printf '🔒 **Constitution change — YOUR manual approval is required**\n\n@lukeet332 — this PR edits the read-only constitution (`AI_CONTEXT_READ_ONLY_BIBLE.md`), so it will **NOT** auto-merge on its own. It stays blocked until you act.\n\n### 🤖 AI reviewer (`%s`) recommendation: %s\n> %s\n\n_(Advisory only — the decision is yours.)_\n\n## 👉 ACTION NEEDED: to approve & release this for auto-merge, reply with a comment that **begins** with:\n\n```\n/approve-bible\n```\n\nDo nothing and it stays blocked indefinitely. The proposed amendment:\n\n```diff\n%s\n```' "$REVIEWER" "$VERDICT" "$ADVICE" "$DIFF")"

      # ---- approved (normal, non-constitution PR): hand to auto-merge ----
      - name: Approve -> automerge
        if: steps.guard.outputs.proceed == 'true' && steps.rev.outputs.bible_touched != 'true' && steps.rev.outputs.verdict == 'approve' && steps.crgate.outputs.cr_blocking != 'true'
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: |
          gh pr comment "$PR" --body "✅ AI review (\`${{ steps.rev.outputs.reviewer }}\`) approved: ${{ steps.rev.outputs.feedback }}"
          gh pr edit "$PR" --add-label automerge --remove-label needs-ai-review

      # ---- churn: already-done / no-op / re-proposed work. RECORD the rejection to the JOURNAL (so it is
      #      not re-proposed), then ask the author for a genuinely NEW idea RIGHT NOW - converge in-run
      #      instead of just waiting for the next scheduled run. Bounded by the revision-budget guard. ----
      - name: Churn -> record it + propose a fresh idea (converge)
        if: steps.guard.outputs.proceed == 'true' && steps.rev.outputs.bible_touched != 'true' && steps.rev.outputs.verdict == 'churn'
        env:
          GH_MODELS_TOKEN: ${{ secrets.BOT_PAT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GH_TOKEN: ${{ secrets.BOT_PAT }}
          FEEDBACK: ${{ steps.rev.outputs.feedback }}
        run: |
          git config user.name "ai-author-bot"
          git config user.email "ai-author-bot@users.noreply.github.com"
          # 1) PERSIST the rejection to main's JOURNAL (append-only) so this idea is NOT re-proposed - by
          #    this run's fresh attempt OR future runs. The churn change is discarded (already-done/no-op),
          #    so we reset to clean main, which also drops the misleading "did X" entry the proposal wrote.
          git fetch origin main --quiet
          git checkout -B main origin/main
          printf '\n### %s - REJECTED AS CHURN (do NOT re-propose)\n- %s\n' "$(date -u +%F)" "$FEEDBACK" >> JOURNAL.md
          git commit -aqm "journal: record a churn rejection [skip ci]"
          git push origin main || (git pull --rebase origin main && git push origin main) || echo "journal push skipped"
          # 2) Ask the author for a genuinely DIFFERENT idea from clean main (NORMAL mode, no revise feedback,
          #    so it restarts rather than patching the churn). It reads the JOURNAL rejection and picks a new
          #    lever. If it produces a self-test-passing change, push it -> review re-runs on the NEW idea
          #    (the [ai-revise] stamp counts toward the budget guard, so churn->fresh can't loop forever).
          git checkout -B "$BRANCH" origin/main
          python .github/scripts/ai_improve.py || true
          if ! git diff --quiet && OUT=$(python selftest.py 2>&1 && python test_behavior.py 2>&1); then
            echo "$OUT"
            H=$(git diff origin/main | git hash-object --stdin | cut -c1-8)
            git commit -aqm "chore: fresh idea after churn [ai-revise h=$H]"
            git push --force origin "HEAD:$BRANCH"    # bot scratch branch; the churn commit is intentionally replaced
            gh pr comment "$PR" --body "🌀 Prior idea was churn (recorded in the JOURNAL so it isn't re-proposed). The author proposed a fresh idea — re-reviewing now." || true
          else
            [ -n "$OUT" ] && echo "$OUT"
            gh pr close "$PR" --delete-branch --comment "$(printf '🌀 **Closed as churn** — recorded in the JOURNAL so it is not re-proposed. A fresh idea did not converge this run; the next maintenance run will try again.')" || true
          fi

      # ---- revise: one concrete fixable blocker - author revises on the same branch (re-triggers review) ----
      - name: Reject -> author revises
        if: steps.guard.outputs.proceed == 'true' && (steps.rev.outputs.verdict == 'revise' || (steps.crgate.outputs.cr_blocking == 'true' && steps.rev.outputs.verdict == 'approve'))
        env:
          GH_MODELS_TOKEN: ${{ secrets.BOT_PAT }}    # GitHub Models needs a real PAT (the built-in GITHUB_TOKEN is not entitled)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          REVIEW_FEEDBACK: ${{ (steps.crgate.outputs.cr_blocking == 'true' && steps.rev.outputs.verdict == 'approve') && 'CodeRabbit (the code-quality reviewer) requested changes and is BLOCKING merge. Read its review comments on this PR and resolve the root cause of each, keeping the tested function names/signatures intact.' || steps.rev.outputs.feedback }}
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: |
          gh pr comment "$PR" --body "🔁 AI review requested changes: ${{ steps.rev.outputs.feedback }}"
          git config user.name "ai-author-bot"
          git config user.email "ai-author-bot@users.noreply.github.com"
          # Self-correcting revision: the author revises, then we run the self-test gate. If it FAILS,
          # don't push a broken revision and don't fail the job outright — feed the self-test output
          # back ALONGSIDE the reviewer's critique and let the author fix the root cause (up to 2
          # attempts), exactly like the maintenance job. Only a self-test-PASSING revision is pushed.
          ORIG_FB="$REVIEW_FEEDBACK"
          for attempt in 1 2 3; do
            # Refresh the diff so the author's revision mode sees its TRUE change-so-far (incl. a prior
            # failed attempt's in-tree edits — it patches that, doesn't restart).
            git diff origin/main > pr.diff || true
            python .github/scripts/ai_improve.py || { echo "::error::author step errored"; exit 1; }
            if git diff --quiet; then
              # No NET change (a no-op edit, or a 'find' that didn't match). DON'T hand off to a human —
              # re-prompt for a concrete, applicable edit and try again, so the AIs converge on a merge.
              echo "::warning::author produced no net change on attempt $attempt — re-prompting for a concrete edit."
              export REVIEW_FEEDBACK="$ORIG_FB

          ALSO: your previous attempt produced NO net change — either a no-op (replace identical to find) or a 'find' that did not match the CURRENT build_cache.py. Output a concrete, DIFFERENT changeset: copy each 'find' VERBATIM from the current file and make 'replace' genuinely differ, addressing the specific objection above."
              continue
            fi
            if OUT=$(python selftest.py 2>&1 && python test_behavior.py 2>&1); then
              echo "$OUT"; echo "revision PASSED the self-test on attempt $attempt — pushing."
              # stamp the resulting full-diff hash so the guard can detect a stalled (identical) revision
              H=$(git diff origin/main | git hash-object --stdin | cut -c1-8)
              git commit -am "chore: revise per AI review [ai-revise h=$H]"
              git push origin "HEAD:$BRANCH"
              exit 0
            fi
            echo "::warning::revision FAILED the self-test on attempt $attempt:"; echo "$OUT"
            export REVIEW_FEEDBACK="$ORIG_FB

          ALSO: your revision FAILED the offline self-test gate — fix the ROOT CAUSE and keep the tested function names/signatures intact (see the Tested-contract section of AI_CONTEXT.md). Self-test output:
          $OUT"
          done
          # Could not converge after the retries (still-failing self-test, or no applicable edit). Don't
          # push a broken branch AND don't hand off to a human — ABANDON this attempt autonomously so the
          # next scheduled maintenance run proposes a FRESH idea. The JOURNAL already records what was
          # tried, so the author won't simply re-propose it. (Prefer convergence; abandon beats limbo.)
          git checkout -- . 2>/dev/null || true
          gh pr comment "$PR" --body "$(printf '🌀 **Abandoned — could not converge.**\n\nAfter several attempts the author could not produce a self-test-passing fix for the review, so this attempt is dropped (not escalated). The next maintenance run will propose a fresh idea.')" || true
          gh pr close "$PR" --delete-branch || true
          echo "::warning::revision could not converge after retries — abandoned autonomously (no human handoff)."

      # ---- budget reached or author stalled: hand to a human ----
      - name: Budget/stall reached -> abandon autonomously (no human handoff)
        if: steps.guard.outputs.proceed != 'true'
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: |
          if [ "${{ steps.guard.outputs.stalled }}" = "true" ]; then WHY="the author stalled (two identical revisions in a row)"; else WHY="the revision budget (${{ steps.guard.outputs.max }} rounds) was reached"; fi
          # Prefer convergence; when the loop can't converge, ABANDON this attempt rather than escalate to
          # a human — the next scheduled maintenance run proposes a fresh idea (the JOURNAL records this one).
          gh pr comment "$PR" --body "🌀 AI review loop stopped — $WHY — abandoning this attempt; the next maintenance run will propose a fresh idea." || true
          gh pr close "$PR" --delete-branch || true
