# CodeRabbit config — capable second-reviewer for this AI-maintained repo.
# Reviews EVERY PR (our weekly author bot's + any human/agent PR) alongside the in-pipeline AI reviewer.
# Free forever for public repos. Docs: https://docs.coderabbit.ai
#
# SINGLE SOURCE OF TRUTH: this file holds NO rules of its own (so nothing can drift from the docs). It
# only points CodeRabbit at the repo's markdown, which is the one place the rules live.
language: en-GB
reviews:
  profile: assertive            # thorough, not chill - this is a safety-critical autonomous pipeline
  request_changes_workflow: true
  high_level_summary: true
  poem: false
  auto_review:
    enabled: true
    drafts: false
  path_instructions:
    - path: "**/*"
      instructions: >
        Read and ENFORCE this repo's own markdown as the SINGLE SOURCE OF TRUTH; apply NO rules from
        anywhere else (so there is nothing for you to drift from). Open and follow these files when
        reviewing every PR:
        - AI_CONTEXT_READ_ONLY_BIBLE.md = the constitution / hard invariants (supreme; if a change
          conflicts with it, request changes).
        - AI_CONTEXT.md = working doctrine, the tested-symbol contract, and the algorithm levers.
        - JOURNAL.md = lessons learned (do-not-repeat ideas + review traps).
        Review each change - especially to build_cache.py - for compliance with those files, and apply
        their lessons as concrete review checks. If those files do not cover something, say so rather
        than inventing a rule.
tone_instructions: >
  Terse, technical, plain-ASCII (no emojis/em-dashes). Prioritise the markdown-defined invariants and
  correctness over style nits.
